server {
    listen 80;

    client_max_body_size 1G;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy API requests to the backend container
    location /api/ {
        proxy_pass http://backend:3000;
    }

    # SPA fallback — all routes serve index.html
    location / {
        try_files $uri /index.html;
    }
}
