# docker-compose.dev.yml
services:
  postgres:
    image: postgres:16
    container_name: relay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
  adminer:
    image: adminer
    container_name: relay-adminer
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: relay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # web console (localhost:9001 in browser)
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticmq:
    image: softwaremill/elasticmq-native:1.6.16
    container_name: relay-elasticmq
    ports:
      - "9324:9324" # SQS-compatible API
      - "9325:9325" # web console
    volumes:
      - ./elasticmq.conf:/opt/elasticmq.conf
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9325"]
      interval: 5s
      timeout: 5s
      retries: 5

  worker:
    build: ./worker
    container_name: relay-worker
    env_file: ./worker/.env.docker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticmq:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
