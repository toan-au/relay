services:
  postgres:
    image: postgres:16
    container_name: relay-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer
    container_name: relay-adminer
    ports:
      - "8080:8080"

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: relay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5

  elasticmq:
    build:
      context: .
      dockerfile: elasticmq.Dockerfile
    container_name: relay-elasticmq
    ports:
      - "9324:9324"
      - "9325:9325"

  backend:
    build: ./backend
    container_name: relay-backend
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SQS_ENDPOINT: ${SQS_ENDPOINT}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      SQS_ACCESS_KEY_ID: ${SQS_ACCESS_KEY_ID}
      SQS_SECRET_ACCESS_KEY: ${SQS_SECRET_ACCESS_KEY}
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticmq:
        condition: service_started

  worker:
    build: ./worker
    container_name: relay-worker
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
      S3_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      S3_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      SQS_ENDPOINT: ${SQS_ENDPOINT}
      SQS_QUEUE_URL: ${SQS_QUEUE_URL}
      SQS_ACCESS_KEY_ID: ${SQS_ACCESS_KEY_ID}
      SQS_SECRET_ACCESS_KEY: ${SQS_SECRET_ACCESS_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      elasticmq:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: relay-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
